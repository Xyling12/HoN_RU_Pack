name: Build HoN RU Pack

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Installer EXE
      shell: pwsh
      run: |
        & .\build_hon_ru_installer_exe.ps1

    - name: Build Uninstaller EXE
      shell: pwsh
      run: |
        & .\build_hon_ru_uninstaller_exe.ps1

    - name: Verify builds
      shell: pwsh
      run: |
        $files = @(
          "dist\HoN_RU_Pack_Installer.exe",
          "dist\HoN_RU_Pack_Installer_Bypass.exe",
          "dist\HoN_RU_Pack_Uninstaller.exe"
        )
        foreach ($f in $files) {
          if (Test-Path $f) {
            $sz = (Get-Item $f).Length
            Write-Host "OK: $f ($sz bytes)"
          } else {
            Write-Error "MISSING: $f"
            exit 1
          }
        }

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: HoN_RU_Pack_Installer
        path: dist/HoN_RU_Pack_Installer.exe

    - name: Upload Installer (Bypass)
      uses: actions/upload-artifact@v4
      with:
        name: HoN_RU_Pack_Installer_Bypass
        path: dist/HoN_RU_Pack_Installer_Bypass.exe

    - name: Upload Uninstaller
      uses: actions/upload-artifact@v4
      with:
        name: HoN_RU_Pack_Uninstaller
        path: dist/HoN_RU_Pack_Uninstaller.exe

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          HoN_RU_Pack_Installer/HoN_RU_Pack_Installer.exe
          HoN_RU_Pack_Installer_Bypass/HoN_RU_Pack_Installer_Bypass.exe
          HoN_RU_Pack_Uninstaller/HoN_RU_Pack_Uninstaller.exe
        generate_release_notes: true
